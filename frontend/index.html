<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Técnico | Open Financial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#0b0e14] text-gray-100 font-sans">

    <nav class="flex justify-between items-center px-12 py-6 border-b border-gray-800 bg-[#0b0e14]/95 sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <a href="home.html" class="text-blue-500 hover:text-blue-400 text-sm font-bold transition">← Voltar</a>
            <div class="text-xl font-bold tracking-tight">
                OPEN <span class="text-blue-500">FINANCIAL</span> 
                <span class="block text-[10px] text-gray-500 font-mono font-normal">// Technical Terminal</span>
            </div>
        </div>
        <div id="connection-status" class="bg-green-500/10 text-green-500 text-[10px] font-bold px-3 py-1 rounded-full border border-green-500/20">
            API ONLINE
        </div>
    </nav>

    <div id="custom-alert" class="hidden fixed top-24 right-5 z-[100] bg-[#12161f] border-l-4 p-4 shadow-xl">
        <div class="flex items-center gap-3">
            <span id="alert-message" class="text-sm"></span>
            <button onclick="closeAlert()" class="text-gray-500 hover:text-white">✕</button>
        </div>
    </div>

    <main class="max-w-[1600px] mx-auto p-6 lg:p-10">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <aside class="lg:col-span-1 space-y-4">
                <h2 class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-4">Ativos na Camada Gold</h2>
                <div id="status-list" class="space-y-3 h-[70vh] overflow-y-auto pr-2 custom-scrollbar">
                    </div>
            </aside>

            <section class="lg:col-span-3 bg-[#12161f] border border-gray-800 rounded-xl p-8 shadow-2xl">
                <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-6">
                    <div>
                        <h2 id="current-ticker" class="text-2xl font-extrabold text-white">Selecione um Ativo</h2>
                        <p class="text-xs text-gray-500 mt-1 font-mono uppercase tracking-tighter">Análise Quantitativa // RSI & Bollinger</p>
                    </div>
                    
                    <div class="flex gap-2">
                        <input type="text" id="new-ticker" class="bg-black border border-gray-700 rounded-md px-3 py-1.5 text-xs focus:border-blue-500 outline-none w-32" placeholder="TICKER.SA">
                        <button onclick="requestIngestion()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold px-3 py-1 rounded-md transition">Baixar</button>
                    </div>
                </div>

                <div class="relative h-[55vh] w-full">
                    <canvas id="mainChart"></canvas>
                </div>
            </section>
        </div>
    </main>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0e14; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>

    <script src="app.js"></script>
</body>
</html>
