<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Financial Lakehouse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="home.html" class="btn-back">← Voltar para Home</a>
            <h1>Open Financial Dashboard</h1>
        </div>
        <div id="connection-status">API Online</div>
    </header>

    <div class="ingestion-form">
        <input type="text" id="new-ticker" placeholder="EX: WEGE3.SA">
        <button onclick="requestIngestion()" class="btn-alt">Baixar Ativo</button>
    </div>

    <div id="custom-alert" class="hidden">
        <span id="alert-message"></span>
        <button onclick="closeAlert()">X</button>
    </div>

    <main class="dashboard-grid">
        <section id="market-summary">
            <h2>Market Status</h2>
            <div id="status-list" class="scrollable">
                </div>
        </section>

        <section id="chart-area">
            <div class="chart-controls">
                <h2 id="current-ticker">Selecione um Ativo</h2>
            </div>
            <canvas id="mainChart"></canvas>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
