version: 2

sources:
  - name: bronze_layer
    schema: default
    tables:
      - name: stock_prices_bronze

models:
  # --- CAMADA SILVER (STAGING ÚNICA) ---
  - name: stg_stocks
    description: "Modelo universal que processa todos os ativos da camada Bronze."
    columns:
      - name: data_referencia
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: preco_fechamento
        tests:
          - not_null

  # --- CAMADA GOLD (TABELA FINAL DO DASHBOARD) ---
  - name: fct_stock_performance
    description: "Tabela Gold consolidada com indicadores de performance para todos os ativos."
    columns:
      - name: data_referencia
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: variacao_diaria_pct
        description: "Variação percentual diária calculada dinamicamente."